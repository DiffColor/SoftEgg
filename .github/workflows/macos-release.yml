name: macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '릴리즈 태그명 (예: v1.0.0). 비워두면 아티팩트만 생성합니다.'
        required: false
        type: string

permissions:
  contents: write

env:
  PROJECT_DIR: soft_egg_packager
  FLUTTER_VERSION: '3.35.5'

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          PUBSPEC_VERSION="$(grep '^version:' "${PROJECT_DIR}/pubspec.yaml" | awk '{print $2}')"
          APP_VERSION="${PUBSPEC_VERSION%%+*}"
          BUILD_NUMBER="${PUBSPEC_VERSION##*+}"
          if [[ "${BUILD_NUMBER}" == "${PUBSPEC_VERSION}" ]]; then
            BUILD_NUMBER="1"
          fi

          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          if [[ -z "${RELEASE_TAG}" && "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          ASSET_NAME="SoftEgg-${APP_VERSION}-macos.zip"

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Flutter pub get
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter analyze

      - name: Test
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter test

      - name: Build macOS app
        working-directory: ${{ env.PROJECT_DIR }}
        run: >
          flutter build macos --release
          --build-name=${{ steps.meta.outputs.app_version }}
          --build-number=${{ steps.meta.outputs.build_number }}

      - name: Package macOS artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="${PROJECT_DIR}/build/macos/Build/Products/Release/soft_egg_packager.app"
          DIST_DIR="${PROJECT_DIR}/dist/macos"
          ZIP_PATH="${DIST_DIR}/${{ steps.meta.outputs.asset_name }}"

          mkdir -p "${DIST_DIR}"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${ZIP_PATH}"

          echo "zip_path=${ZIP_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset_name }}
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

      - name: Create or update GitHub release
        if: ${{ steps.meta.outputs.release_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          RELEASE_TITLE="SoftEgg ${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TITLE}" --notes ""
          fi

      - name: Upload release asset
        if: ${{ steps.meta.outputs.release_tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh release upload "${{ steps.meta.outputs.release_tag }}" "${{ steps.package.outputs.zip_path }}" --clobber
