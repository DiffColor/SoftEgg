name: Tag Build All

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: soft_egg_packager
  RELEASE_NAME: SoftEgg
  FLUTTER_VERSION: '3.35.5'
  ENIGMA_VB_URL: https://enigmaprotector.com/assets/files/enigmavb.exe

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      build_number: ${{ steps.meta.outputs.build_number }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      macos_asset_name: ${{ steps.meta.outputs.macos_asset_name }}
      windows_bundle_name: ${{ steps.meta.outputs.windows_bundle_name }}
      windows_portable_name: ${{ steps.meta.outputs.windows_portable_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          pubspec_version="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          app_version="${pubspec_version%%+*}"
          build_number="${pubspec_version##*+}"
          if [[ "${build_number}" == "${pubspec_version}" ]]; then
            build_number="1"
          fi

          release_tag="${GITHUB_REF_NAME}"
          release_name="${RELEASE_NAME} ${release_tag}"
          prerelease=false
          if [[ "${release_tag}" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "app_version=${app_version}"
            echo "build_number=${build_number}"
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "prerelease=${prerelease}"
            echo "macos_asset_name=${RELEASE_NAME}-${release_tag}-macos.zip"
            echo "windows_bundle_name=${RELEASE_NAME}-${release_tag}-windows-x64.zip"
            echo "windows_portable_name=${RELEASE_NAME}-${release_tag}-windows-x64-portable.exe"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS app
        run: >
          flutter build macos --release
          --build-name=${{ needs.prepare-release.outputs.app_version }}
          --build-number=${{ needs.prepare-release.outputs.build_number }}

      - name: Package macOS artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          app_path="build/macos/Build/Products/Release/${APP_NAME}.app"
          dist_dir="dist/macos"
          zip_path="${dist_dir}/${{ needs.prepare-release.outputs.macos_asset_name }}"

          mkdir -p "${dist_dir}"
          rm -f "${zip_path}"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${zip_path}"

          echo "zip_path=${zip_path}" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: ${{ steps.package.outputs.zip_path }}
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows app
        run: >
          flutter build windows --release --obfuscate
          --split-debug-info=build/windows/debug-info
          --build-name=${{ needs.prepare-release.outputs.app_version }}
          --build-number=${{ needs.prepare-release.outputs.build_number }}

      - name: Install Enigma Virtual Box tool
        shell: pwsh
        run: |
          $installerDir = Join-Path $env:RUNNER_TEMP 'enigma-vb'
          $installerPath = Join-Path $installerDir 'enigmavb.exe'

          New-Item -ItemType Directory -Path $installerDir -Force | Out-Null
          Invoke-WebRequest `
            -Uri '${{ env.ENIGMA_VB_URL }}' `
            -OutFile $installerPath `
            -UserAgent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36'

          Start-Process `
            -FilePath $installerPath `
            -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-' `
            -Wait `
            -NoNewWindow

      - name: Install EVB project generator
        shell: pwsh
        run: |
          npm install --no-save generate-evb

      - name: Resolve Enigma console path
        id: enigma
        shell: pwsh
        run: |
          $console = Get-ChildItem 'C:\Program Files*' -Filter 'enigmavbconsole.exe' -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($console)) {
            throw 'enigmavbconsole.exe 를 찾지 못했습니다.'
          }

          "console_path=$console" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Prepare Windows bundle
        id: bundle
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD 'build/windows/x64/runner/Release'
          $distDir = Join-Path $PWD 'dist/windows'
          $bundleDir = Join-Path $distDir 'bundle'
          $bundleZip = Join-Path $distDir '${{ needs.prepare-release.outputs.windows_bundle_name }}'

          Remove-Item $bundleDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          Copy-Item "$releaseDir\*" $bundleDir -Recurse -Force
          if (Test-Path $bundleZip) {
            Remove-Item $bundleZip -Force
          }
          Compress-Archive -Path "$bundleDir\*" -DestinationPath $bundleZip -Force

          "release_dir=$releaseDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "dist_dir=$distDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "bundle_zip=$bundleZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Generate Enigma project file
        id: evb
        shell: pwsh
        run: |
          $releaseDir = '${{ steps.bundle.outputs.release_dir }}'
          $distDir = '${{ steps.bundle.outputs.dist_dir }}'
          $portableExe = Join-Path $distDir '${{ needs.prepare-release.outputs.windows_portable_name }}'
          $projectFile = Join-Path $distDir 'soft_egg_packager.evb'

          if (Test-Path $portableExe) {
            Remove-Item $portableExe -Force
          }
          if (Test-Path $projectFile) {
            Remove-Item $projectFile -Force
          }

          $script = @'
          const path = require("node:path");
          const generateEvb = require("generate-evb");

          const projectFile = process.env.EVB_PROJECT_FILE;
          const releaseDir = process.env.EVB_RELEASE_DIR;
          const portableExe = process.env.EVB_PORTABLE_EXE;
          const inputExe = path.join(releaseDir, "soft_egg_packager.exe");
          const normalizedPortable = path.resolve(portableExe).toLowerCase();
          const normalizedProject = path.resolve(projectFile).toLowerCase();

          generateEvb(projectFile, inputExe, portableExe, releaseDir, {
            filter: (fullPath, name, isDir) => {
              if (isDir) {
                return true;
              }
              const normalized = path.resolve(fullPath).toLowerCase();
              if (normalized === normalizedPortable || normalized === normalizedProject) {
                return false;
              }
              return !normalized.endsWith(".pdb");
            },
            evbOptions: {
              compressFiles: false,
              deleteExtractedOnExit: false,
              shareVirtualSystem: false,
              mapExecutableWithTemporaryFile: false,
              allowRunningOfVirtualExeFiles: true
            }
          });
          '@

          $env:EVB_PROJECT_FILE = $projectFile
          $env:EVB_RELEASE_DIR = $releaseDir
          $env:EVB_PORTABLE_EXE = $portableExe
          node -e $script

          "project_file=$projectFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "portable_exe=$portableExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build portable executable
        shell: pwsh
        run: |
          & '${{ steps.enigma.outputs.console_path }}' '${{ steps.evb.outputs.project_file }}'

          if (-not (Test-Path '${{ steps.evb.outputs.portable_exe }}')) {
            throw '포터블 EXE 생성에 실패했습니다.'
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            ${{ steps.bundle.outputs.bundle_zip }}
            ${{ steps.evb.outputs.portable_exe }}
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build-macos
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          prerelease: ${{ needs.prepare-release.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*
